<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSPI Market Dashboard - 실시간 증시 요약</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <h1 class="title">KOSPI MARKET DASHBOARD</h1>
            <p class="subtitle">실시간 글로벌 시장 지표 및 코스피 분석 (Multi-Interval)</p>
        </div>
        <div class="market-status">
            <span class="status-dot pulse"></span>
            <span id="market-time">MARKET OPEN</span>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- 1. KOSPI -->
        <div class="chart-card" data-symbol="AMEX:EWY" data-title="KOSPI (한국 지수 - EWY)">
            <div class="card-header">
                <h2 class="chart-title">KOSPI (한국 지수)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_kospi" class="chart-container"></div>
        </div>

        <!-- 2. S&P 500 -->
        <div class="chart-card" data-symbol="AMEX:SPY" data-title="S&P 500 (미국 대형주 - SPY)">
            <div class="card-header">
                <h2 class="chart-title">S&P 500 (미국 대형주)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_sp500" class="chart-container"></div>
        </div>

        <!-- 3. NASDAQ 100 -->
        <div class="chart-card" data-symbol="NASDAQ:QQQ" data-title="NASDAQ 100 (기술주 - QQQ)">
            <div class="card-header">
                <h2 class="chart-title">NASDAQ 100 (기술주)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_nasdaq" class="chart-container"></div>
        </div>

        <!-- 4. KOSPI 200 -->
        <div class="chart-card" data-symbol="KRX:KOSPI200" data-title="KOSPI 200 (국내 우량주)">
            <div class="card-header">
                <h2 class="chart-title">KOSPI 200 (국내 우량주)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_k200" class="chart-container"></div>
        </div>

        <!-- 5. USD/KRW -->
        <div class="chart-card" data-symbol="FX_IDC:USDKRW" data-title="USD / KRW (원/달러 환율)">
            <div class="card-header">
                <h2 class="chart-title">USD / KRW (환율)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_fx" class="chart-container"></div>
        </div>

        <!-- 6. US 10Y Yield -->
        <div class="chart-card" data-symbol="TVC:US10Y" data-title="US 10Y YIELD (미국채 10년)">
            <div class="card-header">
                <h2 class="chart-title">US 10Y YIELD (국채금리)</h2>
                <div class="interval-selector">
                    <button class="int-btn" data-int="5">5m</button>
                    <button class="int-btn" data-int="60">1h</button>
                    <button class="int-btn active" data-int="D">D</button>
                    <button class="int-btn" data-int="W">W</button>
                </div>
            </div>
            <div id="chart_yield" class="chart-container"></div>
        </div>
    </main>

    <footer class="footer">
        <p>Charts powered by TradingView. Interval selection enabled for real-time analysis.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
