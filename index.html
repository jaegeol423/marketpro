<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSPI Market Dashboard - 실시간 증시 요약</title>
    <link rel="stylesheet" href="style.css">
    <!-- TradingView 실시간 차트 라이브러리 로드 -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <h1 class="title">KOSPI MARKET DASHBOARD</h1>
            <p class="subtitle">실시간 글로벌 시장 지표 및 코스피 분석 (ETF 기반)</p>
        </div>
        <div class="market-status">
            <span class="status-dot pulse"></span>
            <span id="market-time">MARKET OPEN</span>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- 1. KOSPI (via EWY ETF for stability) -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI (한국 지수 - EWY)</h2>
            <div id="chart_kospi" class="chart-container"></div>
        </div>

        <!-- 2. S&P 500 (via SPY ETF) -->
        <div class="chart-card">
            <h2 class="chart-title">S&P 500 (미국 대형주 - SPY)</h2>
            <div id="chart_sp500" class="chart-container"></div>
        </div>

        <!-- 3. NASDAQ 100 (via QQQ ETF) -->
        <div class="chart-card">
            <h2 class="chart-title">NASDAQ 100 (기술주 - QQQ)</h2>
            <div id="chart_nasdaq" class="chart-container"></div>
        </div>

        <!-- 4. KOSPI 200 (코스피 200 지수) -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI 200 (국내 우량주)</h2>
            <div id="chart_k200" class="chart-container"></div>
        </div>

        <!-- 5. USD/KRW Exchange Rate -->
        <div class="chart-card">
            <h2 class="chart-title">USD / KRW (원/달러 환율)</h2>
            <div id="chart_fx" class="chart-container"></div>
        </div>

        <!-- 6. US 10Y Yield -->
        <div class="chart-card">
            <h2 class="chart-title">US 10Y YIELD (미국채 10년)</h2>
            <div id="chart_yield" class="chart-container"></div>
        </div>
    </main>

    <footer class="footer">
        <p>Charts powered by TradingView. 데이터 안정성을 위해 지수 추종 ETF를 활용합니다.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
