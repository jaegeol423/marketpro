<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSPI Market Dashboard - 실시간 증시 요약</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <h1 class="title">KOSPI MARKET DASHBOARD</h1>
            <p class="subtitle">실시간 글로벌 시장 지표 및 코스피 분석</p>
        </div>
        <div class="market-status">
            <span class="status-dot pulse"></span>
            <span id="market-time">MARKET OPEN</span>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- 1. KOSPI Index -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI INDEX (코스피)</h2>
            <div id="chart-kospi" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["KOSPI", "KOSPI"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "showMA": false,
                    "hideDateRanges": false,
                    "hideMarketStatus": false,
                    "hideSymbolLogo": false,
                    "scalePosition": "right",
                    "scaleMode": "Normal",
                    "fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
                    "fontSize": "10",
                    "noOverlays": false,
                    "valuesTracking": "1",
                    "changeMode": "price-and-percent",
                    "chartType": "area",
                    "maLineColor": "#2962FF",
                    "maLineWidth": 1,
                    "maLength": 9,
                    "lineWidth": 2,
                    "lineColor": "#2962FF",
                    "topColor": "rgba(41, 98, 255, 0.3)",
                    "bottomColor": "rgba(41, 98, 255, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 2. S&P 500 Index (via SPY ETF for stability) -->
        <div class="chart-card">
            <h2 class="chart-title">S&P 500 (SPY ETF)</h2>
            <div id="chart-sp500" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["AMEX:SPY", "SPY"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "chartType": "area",
                    "lineColor": "#FF9800",
                    "topColor": "rgba(255, 152, 0, 0.3)",
                    "bottomColor": "rgba(255, 152, 0, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 3. NASDAQ 100 (via QQQ ETF for stability) -->
        <div class="chart-card">
            <h2 class="chart-title">NASDAQ 100 (QQQ ETF)</h2>
            <div id="chart-nasdaq" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["NASDAQ:QQQ", "QQQ"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "chartType": "area",
                    "lineColor": "#00BCD4",
                    "topColor": "rgba(0, 188, 212, 0.3)",
                    "bottomColor": "rgba(0, 188, 212, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 4. KOSPI 200 Index -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI 200 (코스피 200)</h2>
            <div id="chart-night" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["KRX:KOSPI200", "KOSPI 200"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "chartType": "area",
                    "lineColor": "#9C27B0",
                    "topColor": "rgba(156, 39, 176, 0.3)",
                    "bottomColor": "rgba(156, 39, 176, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 5. USD/KRW Exchange Rate -->
        <div class="chart-card">
            <h2 class="chart-title">USD / KRW (원/달러 환율)</h2>
            <div id="chart-fx" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["FX_IDC:USDKRW", "USD/KRW"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "chartType": "area",
                    "lineColor": "#4CAF50",
                    "topColor": "rgba(76, 175, 80, 0.3)",
                    "bottomColor": "rgba(76, 175, 80, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 6. US 10Y Yield -->
        <div class="chart-card">
            <h2 class="chart-title">US 10Y YIELD (미국채 10년)</h2>
            <div id="chart-yield" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                    {
                    "symbols": [["TVC:US10Y", "US 10Y"]],
                    "chartOnly": true,
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "colorTheme": "dark",
                    "autosize": true,
                    "showVolume": false,
                    "chartType": "area",
                    "lineColor": "#F44336",
                    "topColor": "rgba(244, 67, 54, 0.3)",
                    "bottomColor": "rgba(244, 67, 54, 0)"
                    }
                    </script>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Charts powered by TradingView. Data may be delayed based on exchange regulations.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
